<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>♜ Тренажёр шахматных координат</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app">
        <div class="board-wrapper">
            <div class="board-row-container">
                <!-- Вертикальные метки рангов -->
                <div class="rank-labels" id="rankLabels"></div>
                <!-- Шахматная доска -->
                <div class="chess-board" id="chessBoard"></div>
            </div>
            <!-- Горизонтальные метки файлов -->
            <div class="file-labels" id="fileLabels"></div>
        </div>

        <!-- Единая строка управления -->
        <div class="controls">
            <div class="controls-row">
                <button class="btn" id="nextBtn">⟳ Следующая</button>
                <button class="btn rotate-btn" id="rotateBtn">🔄 Повернуть</button>

                <!-- Динамическая кнопка: Старт / Стоп -->
                <button class="btn start-stop-btn" id="startStopBtn">▶ Старт</button>

                <!-- Интервал в той же строке -->
                <div class="interval-control">
                    <span class="interval-label">⏱ Интервал</span>
                    <input type="number" id="intervalInput" class="time-input" min="0.5" max="10" step="0.5" value="1">
                    <span class="time-unit">сек</span>
                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
